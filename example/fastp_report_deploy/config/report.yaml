project:
  ID: KM-XS-2508-005
  name: 广东省农科院香芽蕉时空转录组研究
  description: 本项目旨在通过时空转录组测序，解析香芽蕉在不同生长阶段和组织中的基因表达动态变化，揭示其生长发育和抗逆机制，为香芽蕉的育种和栽培提供分子基础
  author: 康美华大生信部
  date: 2026-01-08

input:
  fastp_json_dir: Input/fastp_json

output:
  html: Output/html/fastp_qc_summary.html
  pdf: Output/pdf/fastp_qc_summary.pdf

